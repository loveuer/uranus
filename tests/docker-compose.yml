version: '3.8'

services:
  # Uranus 服务
  uranus:
    build:
      context: ..
      dockerfile: Dockerfile.test
    ports:
      - "9817:9817"
      - "5000:5000"   # Docker registry
      - "4873:4873"   # npm registry
    environment:
      - JWT_SECRET=test-secret-for-e2e-testing-only
      - DB_DRIVER=sqlite
      - DB_DSN=/data/uranus.db
      - UFSHARE_ADDRESS=0.0.0.0:9817
      - UFSHARE_NPM_ADDR=0.0.0.0:4873
      - UFSHARE_OCI_ADDR=0.0.0.0:5000
    volumes:
      - uranus-data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9817/api/v1/auth/me"]
      interval: 5s
      timeout: 10s
      retries: 10

  # File Store 测试
  test-file:
    image: alpine:latest
    depends_on:
      uranus:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts
    command: sh -c "apk add curl && /scripts/test-file.sh"
    profiles:
      - file

  # Docker/OCI 测试
  test-docker:
    image: docker:latest
    depends_on:
      uranus:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts
      - /var/run/docker.sock:/var/run/docker.sock
    command: sh /scripts/test-docker.sh
    profiles:
      - docker

  # npm 测试
  test-npm:
    image: node:22-alpine
    depends_on:
      uranus:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts
      - ./fixtures/npm:/fixtures
    command: sh /scripts/test-npm.sh
    profiles:
      - npm

  # Go 测试
  test-go:
    image: golang:1.23-alpine
    depends_on:
      uranus:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts
    command: sh /scripts/test-go.sh
    profiles:
      - go

  # PyPI 测试
  test-pypi:
    image: python:3.12-slim
    depends_on:
      uranus:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts
      - ./fixtures/pypi:/fixtures
    command: sh /scripts/test-pypi.sh
    profiles:
      - pypi

  # Maven 测试
  test-maven:
    image: maven:3.9-eclipse-temurin-21
    depends_on:
      uranus:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts
      - ./fixtures/maven:/fixtures
    command: sh /scripts/test-maven.sh
    profiles:
      - maven

volumes:
  uranus-data:
