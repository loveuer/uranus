name: CI

on:
  push:
    branches:
      - master
      - main
      - develop
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  # 单元测试
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Run unit tests
        run: |
          go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  # 集成测试
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Run integration tests
        env:
          JWT_SECRET: test-secret-for-ci-testing-only
        run: |
          go test -v -race -timeout 30m ./tests/...

  # 模块测试 - File Store
  test-filestore:
    name: Test File Store (v1.1.0)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Run file-store tests
        env:
          JWT_SECRET: test-secret-for-ci-testing-only
        run: |
          go test -v -run TestFileStore ./tests/...

  # 模块测试 - OCI
  test-oci:
    name: Test OCI Registry (v1.1.1)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Run OCI tests
        env:
          JWT_SECRET: test-secret-for-ci-testing-only
        run: |
          go test -v -run TestOCI ./tests/...

  # 模块测试 - Go Proxy
  test-goproxy:
    name: Test Go Proxy (v1.1.2)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Run Go proxy tests
        env:
          JWT_SECRET: test-secret-for-ci-testing-only
        run: |
          go test -v -run TestGoProxy ./tests/...

  # 模块测试 - NPM
  test-npm:
    name: Test NPM Registry (v1.1.3)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Run NPM tests
        env:
          JWT_SECRET: test-secret-for-ci-testing-only
        run: |
          go test -v -run TestNpm ./tests/...

  # 模块测试 - PyPI
  test-pypi:
    name: Test PyPI (v1.1.4)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Run PyPI tests
        env:
          JWT_SECRET: test-secret-for-ci-testing-only
        run: |
          go test -v -run TestPyPI ./tests/...

  # 模块测试 - Maven
  test-maven:
    name: Test Maven (v1.1.5)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Run Maven tests
        env:
          JWT_SECRET: test-secret-for-ci-testing-only
        run: |
          go test -v -run TestMaven ./tests/...

  # 代码检查
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Run go vet
        run: go vet ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  # 构建检查
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build
        run: |
          go build -v -o uranus ./cmd/uranus

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: uranus-linux-amd64
          path: uranus
          retention-days: 1

  # 前端构建检查
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build
        working-directory: web
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist/
          retention-days: 1

  # 测试覆盖率报告
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [test, integration-test]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage

      - name: Report coverage
        run: |
          go tool cover -func=coverage.out

  # 所有测试通过的总结
  all-tests-pass:
    name: All Tests Pass
    runs-on: ubuntu-latest
    needs:
      - test
      - integration-test
      - test-filestore
      - test-oci
      - test-goproxy
      - test-npm
      - test-pypi
      - test-maven
      - lint
      - build
      - build-frontend
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.test.result }}" != "success" || \
                "${{ needs.integration-test.result }}" != "success" || \
                "${{ needs.test-filestore.result }}" != "success" || \
                "${{ needs.test-oci.result }}" != "success" || \
                "${{ needs.test-goproxy.result }}" != "success" || \
                "${{ needs.test-npm.result }}" != "success" || \
                "${{ needs.test-pypi.result }}" != "success" || \
                "${{ needs.test-maven.result }}" != "success" || \
                "${{ needs.lint.result }}" != "success" || \
                "${{ needs.build.result }}" != "success" || \
                "${{ needs.build-frontend.result }}" != "success" ]]; then
            echo "Some tests failed!"
            exit 1
          fi
          echo "All tests passed!"
