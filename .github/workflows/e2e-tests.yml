name: E2E Tests

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      test_module:
        description: 'Test module to run (all/file/docker/npm/go/pypi/maven)'
        required: false
        default: 'all'

jobs:
  # 构建测试镜像
  build:
    name: Build Test Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: tests/Dockerfile.test
          tags: uranus-test:latest
          outputs: type=docker,dest=/tmp/uranus-test.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload image
        uses: actions/upload-artifact@v4
        with:
          name: uranus-test-image
          path: /tmp/uranus-test.tar
          retention-days: 1

  # File Store 测试
  test-file:
    name: File Store (v1.1.0)
    runs-on: ubuntu-latest
    needs: build
    if: github.event.inputs.test_module == 'all' || github.event.inputs.test_module == 'file' || github.event.inputs.test_module == ''
    steps:
      - uses: actions/checkout@v4

      - name: Download image
        uses: actions/download-artifact@v4
        with:
          name: uranus-test-image
          path: /tmp

      - name: Load image
        run: docker load --input /tmp/uranus-test.tar

      - name: Run File Store tests
        run: |
          chmod +x tests/scripts/test-file.sh
          docker-compose -f tests/docker-compose.yml up -d uranus
          sleep 10
          URANUS_HOST=localhost:9817 tests/scripts/test-file.sh

      - name: Collect logs
        if: failure()
        run: docker-compose -f tests/docker-compose.yml logs

      - name: Cleanup
        if: always()
        run: docker-compose -f tests/docker-compose.yml down -v

  # Docker/OCI 测试
  test-docker:
    name: Docker/OCI Registry (v1.1.1)
    runs-on: ubuntu-latest
    needs: build
    if: github.event.inputs.test_module == 'all' || github.event.inputs.test_module == 'docker' || github.event.inputs.test_module == ''
    steps:
      - uses: actions/checkout@v4

      - name: Download image
        uses: actions/download-artifact@v4
        with:
          name: uranus-test-image
          path: /tmp

      - name: Load image
        run: docker load --input /tmp/uranus-test.tar

      - name: Run Docker tests
        run: |
          chmod +x tests/scripts/test-docker.sh
          docker-compose -f tests/docker-compose.yml up -d uranus
          sleep 10
          URANUS_HOST=localhost:5000 tests/scripts/test-docker.sh

      - name: Collect logs
        if: failure()
        run: docker-compose -f tests/docker-compose.yml logs

      - name: Cleanup
        if: always()
        run: docker-compose -f tests/docker-compose.yml down -v

  # NPM 测试
  test-npm:
    name: NPM Registry (v1.1.3)
    runs-on: ubuntu-latest
    needs: build
    if: github.event.inputs.test_module == 'all' || github.event.inputs.test_module == 'npm' || github.event.inputs.test_module == ''
    steps:
      - uses: actions/checkout@v4

      - name: Download image
        uses: actions/download-artifact@v4
        with:
          name: uranus-test-image
          path: /tmp

      - name: Load image
        run: docker load --input /tmp/uranus-test.tar

      - name: Run NPM tests
        run: |
          chmod +x tests/scripts/test-npm.sh
          docker-compose -f tests/docker-compose.yml up -d uranus
          sleep 10
          URANUS_HOST=localhost:9817 tests/scripts/test-npm.sh

      - name: Collect logs
        if: failure()
        run: docker-compose -f tests/docker-compose.yml logs

      - name: Cleanup
        if: always()
        run: docker-compose -f tests/docker-compose.yml down -v

  # Go Proxy 测试
  test-go:
    name: Go Modules Proxy (v1.1.2)
    runs-on: ubuntu-latest
    needs: build
    if: github.event.inputs.test_module == 'all' || github.event.inputs.test_module == 'go' || github.event.inputs.test_module == ''
    steps:
      - uses: actions/checkout@v4

      - name: Download image
        uses: actions/download-artifact@v4
        with:
          name: uranus-test-image
          path: /tmp

      - name: Load image
        run: docker load --input /tmp/uranus-test.tar

      - name: Run Go tests
        run: |
          chmod +x tests/scripts/test-go.sh
          docker-compose -f tests/docker-compose.yml up -d uranus
          sleep 10
          URANUS_HOST=localhost:9817 tests/scripts/test-go.sh

      - name: Collect logs
        if: failure()
        run: docker-compose -f tests/docker-compose.yml logs

      - name: Cleanup
        if: always()
        run: docker-compose -f tests/docker-compose.yml down -v

  # PyPI 测试
  test-pypi:
    name: PyPI Registry (v1.1.4)
    runs-on: ubuntu-latest
    needs: build
    if: github.event.inputs.test_module == 'all' || github.event.inputs.test_module == 'pypi' || github.event.inputs.test_module == ''
    steps:
      - uses: actions/checkout@v4

      - name: Download image
        uses: actions/download-artifact@v4
        with:
          name: uranus-test-image
          path: /tmp

      - name: Load image
        run: docker load --input /tmp/uranus-test.tar

      - name: Run PyPI tests
        run: |
          chmod +x tests/scripts/test-pypi.sh
          docker-compose -f tests/docker-compose.yml up -d uranus
          sleep 10
          URANUS_HOST=localhost:9817 tests/scripts/test-pypi.sh

      - name: Collect logs
        if: failure()
        run: docker-compose -f tests/docker-compose.yml logs

      - name: Cleanup
        if: always()
        run: docker-compose -f tests/docker-compose.yml down -v

  # Maven 测试
  test-maven:
    name: Maven Repository (v1.1.5)
    runs-on: ubuntu-latest
    needs: build
    if: github.event.inputs.test_module == 'all' || github.event.inputs.test_module == 'maven' || github.event.inputs.test_module == ''
    steps:
      - uses: actions/checkout@v4

      - name: Download image
        uses: actions/download-artifact@v4
        with:
          name: uranus-test-image
          path: /tmp

      - name: Load image
        run: docker load --input /tmp/uranus-test.tar

      - name: Run Maven tests
        run: |
          chmod +x tests/scripts/test-maven.sh
          docker-compose -f tests/docker-compose.yml up -d uranus
          sleep 10
          URANUS_HOST=localhost:9817 tests/scripts/test-maven.sh

      - name: Collect logs
        if: failure()
        run: docker-compose -f tests/docker-compose.yml logs

      - name: Cleanup
        if: always()
        run: docker-compose -f tests/docker-compose.yml down -v

  # 测试结果汇总
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [build, test-file, test-docker, test-npm, test-go, test-pypi, test-maven]
    if: always()
    steps:
      - name: Check test results
        run: |
          echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Module | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.test-file.result }}" == "success" ]; then
            echo "| File Store (v1.1.0) | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| File Store (v1.1.0) | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.test-docker.result }}" == "success" ]; then
            echo "| Docker/OCI (v1.1.1) | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Docker/OCI (v1.1.1) | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.test-go.result }}" == "success" ]; then
            echo "| Go Proxy (v1.1.2) | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Go Proxy (v1.1.2) | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.test-npm.result }}" == "success" ]; then
            echo "| NPM (v1.1.3) | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| NPM (v1.1.3) | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.test-pypi.result }}" == "success" ]; then
            echo "| PyPI (v1.1.4) | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| PyPI (v1.1.4) | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.test-maven.result }}" == "success" ]; then
            echo "| Maven (v1.1.5) | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Maven (v1.1.5) | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Fail if any test failed
        if: contains(needs.*.result, 'failure')
        run: exit 1
